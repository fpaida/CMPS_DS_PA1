// The binary and binary search trees //
//------------------------------------//
console.log("The binary and binary search trees");

function BinarySearchTree() {
  function Node(key) {
    this.key = key;
    this.left = null;
    this.right = null;
  }

  // the root node
  var root = null;

  // helper functions
  function insertNode(node, newNode) {
    if (newNode.key < node.key) {
      // go to left
      if (node.left === null) {
        // no left node yet so assign
        node.left = newNode;
      }
      else {
        // move down tree and repeat
        insertNode(node.left, newNode);
      }
    }
    else {
      // go to right
      if (node.right === null) {
        // no right node yet so assign
        node.right = newNode;
      }
      else {
        // move down tree and repeat
        insertNode(node.right, newNode);
      }
    }
  }

  function searchNode(node, key) {
    if (node === null) {
      return false;
    }

    if (key < node.key) {
      return searchNode(node.left, key);
    }
    else if (key > node.key) {
      return searchNode(node.right, key);
    }
    else {
      return true;
    }
  }

  function inOrderTraverseNode(node, callback) {
    if (node !== null) {
      inOrderTraverseNode(node.left, callback);
      callback(node.key);
      inOrderTraverseNode(node.right, callback);
    }
  }

  function preOrderTraverseNode(node, callback) {
    if (node !== null) {
      callback(node.key);
      preOrderTraverseNode(node.left, callback);
      preOrderTraverseNode(node.right, callback);
    }
  }

  function postOrderTraverseNode(node, callback) {
    if (node !== null) {
      postOrderTraverseNode(node.left, callback);
      postOrderTraverseNode(node.right, callback);
      callback(node.key);
    }
  }

  function minNode(node) {
    while (node && node.left !== null) {
      node = node.left;
    }

    return node;
  }

  function maxNode(node) {
    while (node && node.right !== null) {
      node = node.right;
    }

    return node;
  }

  this.insert = function(key) {
    // insert new key in the tree
    var newNode = new Node(key);
    if (root === null) {
      // no nodes yet
      root = newNode;
    }
    else {
      // find insert location through insertNode
      insertNode(root, newNode);
    }
  };

  this.search = function(key) {
    // search for key and return true if found, false otherwise

    return searchNode(root, key);
  };

  this.inOrderTraverse = function(callback) {
    // visit all nodes of the tree using in-order traversal
    // call callback with each key encountered

    inOrderTraverseNode(root, callback);
  };

  this.preOrderTraverse = function(callback) {
    // visit all nodes of the tree using pre-order traversal
    // call callback with each key encountered

    preOrderTraverseNode(root, callback);
  };

  this.postOrderTraverse = function(callback) {
    // visit all nodes of the tree using post-order traversal
    // call callback with each key encountered

    postOrderTraverseNode(root, callback);
  };

  this.min = function() {
    // return the minimum key in the tree

    var node = minNode(root);
    return node ? node.key : null;
  };

  this.max = function() {
    // return the maximum key in the tree

    var node = maxNode(root);
    return node ? node.key : null;
  };

  this.remove = function() {
    // removes the key from the tree

    // Not implemented in this assignment section.
  };

  this.print = function() {
    function print(node) {
      // check if not is not null
      if (node !== null) {
        // text for left child
        var leftChild = node.left !== null ? node.left.key : "None";
        // text for right child
        var rightChild = node.right !== null ? node.right.key : "None";
        // print output
        console.log(leftChild + " <-- " + node.key + " --> " + rightChild);
        // traverse left
        print(node.left);
        // traverse right
        print(node.right);
      }
    }
    console.log("===tree===");
    print(root);
    console.log("==========");
  };
}

// 1. Implement the Graph class.

function Graph() {

  var vertices = [];
  var adjList = {};

  this.addVertex = function(v) {
    vertices.push(v);
    adjList[v] = [];
  };

  this.addEdge = function(v, w) {
    adjList[v].push(w);
    adjList[w].push(v);
  };

  this.toString = function() {
    var s = "";

    for (var i = 0; i < vertices.length; i++) {
      s += vertices[i] + " -> ";

      for (var j = 0; j < adjList[vertices[i]].length; j++) {
        s += adjList[vertices[i]][j] + " ";
      }

      s += "\n";
    }

    return s;
  };

  // 1. Implement breadth-first search in the Graph class above.

  this.bfs = function(startVertex) {

    var color = {};
    var queue = [];

    for (var i = 0; i < vertices.length; i++) {
      color[vertices[i]] = "white";
    }

    queue.push(startVertex);

    while (queue.length > 0) {

      var u = queue.shift();

      color[u] = "grey";

      var neighbors = adjList[u];

      for (var i = 0; i < neighbors.length; i++) {

        var w = neighbors[i];

        if (color[w] === "white") {
          color[w] = "grey";
          queue.push(w);
        }
      }

      color[u] = "black";
      console.log(u);
    }
  };

  // 2. Implement depth-first search in the Graph class above.

  this.dfs = function() {

    var color = {};

    for (var i = 0; i < vertices.length; i++) {
      color[vertices[i]] = "white";
    }

    function dfsVisit(u) {

      color[u] = "grey";

      console.log(u);

      var neighbors = adjList[u];

      for (var i = 0; i < neighbors.length; i++) {

        var w = neighbors[i];

        if (color[w] === "white") {
          dfsVisit(w);
        }
      }

      color[u] = "black";
    }

    for (var i = 0; i < vertices.length; i++) {

      if (color[vertices[i]] === "white") {
        dfsVisit(vertices[i]);
      }
    }
  };
}

// 1. Implement Dijkstra's algorithm.
//    NOTE: Replace INF (used in the book) with Infinity.

function dijkstra(graph, src) {

  var dist = [];
  var visited = [];

  for (var i = 0; i < graph.length; i++) {
    dist[i] = Infinity;
    visited[i] = false;
  }

  dist[src] = 0;

  for (var count = 0; count < graph.length - 1; count++) {

    var min = Infinity;
    var u = -1;

    for (var v = 0; v < graph.length; v++) {

      if (!visited[v] && dist[v] <= min) {
        min = dist[v];
        u = v;
      }
    }

    visited[u] = true;

    for (var v = 0; v < graph.length; v++) {

      if (
        !visited[v] &&
        graph[u][v] !== 0 &&
        dist[u] !== Infinity &&
        dist[u] + graph[u][v] < dist[v]
      ) {
        dist[v] = dist[u] + graph[u][v];
      }
    }
  }

  return dist;
}
