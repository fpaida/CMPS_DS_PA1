// 1. Implement the ArrayList constructor.

function ArrayList() {

    var array = [];

    this.insert = function(item) {
        array.push(item);
    };

    this.toString = function() {
        return array.join(", ");
    };

    var swap = function(array, index1, index2) {
        var temp = array[index1];
        array[index1] = array[index2];
        array[index2] = temp;
    };


// 3. Implement Bubble Sort inside the ArrayList constructor and test your code.

    this.bubbleSort = function() {

        var length = array.length;

        for (var i = 0; i < length; i++) {

            for (var j = 0; j < length - 1; j++) {

                if (array[j] > array[j + 1]) {
                    swap(array, j, j + 1);
                }
            }
        }
    };


// 4. Implement Selection Sort inside the ArrayList constructor and test your code.

    this.selectionSort = function() {

        var length = array.length;
        var indexMin;

        for (var i = 0; i < length - 1; i++) {

            indexMin = i;

            for (var j = i + 1; j < length; j++) {

                if (array[indexMin] > array[j]) {
                    indexMin = j;
                }
            }

            if (i !== indexMin) {
                swap(array, i, indexMin);
            }
        }
    };


// Searching Question 1

    this.sequentialSearch = function(item) {

        for (var i = 0; i < array.length; i++) {

            if (array[i] === item) {
                return i;
            }
        }

        return -1;
    };
}



// 2. Implement the createNonSortedArray(size) function from the book.

function createNonSortedArray(size) {

    var array = new ArrayList();

    for (var i = size; i > 0; i--) {
        array.insert(i);
    }

    return array;
}



// 3. Implement Bubble Sort inside the ArrayList constructor and test your code.

var bubbleArray = createNonSortedArray(5);

console.log("Bubble Sort Before: " + bubbleArray.toString());

bubbleArray.bubbleSort();

console.log("Bubble Sort After: " + bubbleArray.toString());



// 4. Implement Selection Sort inside the ArrayList constructor and test your code.
