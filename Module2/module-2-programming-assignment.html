console.log("The stack data structure");

// 1. Implement the stack data structure described in the book. Instead of
//    using 'let items = [];' use 'var items = []'. Note that this
//    implementation does not use the prototype (see project).

function Stack() {
  // properties and methods go here

  var items = [];

  this.push = function(element) {
    items.push(element);
  };

  this.pop = function() {
    return items.pop();
  };

  this.peek = function() {
    return items[items.length - 1];
  };

  this.isEmpty = function() {
    return items.length === 0;
  };

  this.size = function() {
    return items.length;
  };

  this.print = function() {
    console.log(items.toString());
  };

}

// 2. Write a simple test program that shows your stack works.

console.log("Is empty:", stack.isEmpty());

stack.push(5);
stack.push(8);
stack.push(11);

console.log("After push:");
stack.print();

console.log("Stack size:", stack.size());

console.log("Top element:", stack.peek());

console.log("Removed element:", stack.pop());

console.log("After pop:");
stack.print();

console.log("Stack size after pop:", stack.size());

// 1. Use the prompt to ask for a decimal number. Then write a loop that divides

// 2. The algorithm in (1) can be used to convert a decimal number to a binary
//    number but there is one issue. What is the problem?
// Problem:
// The binary digits are generated in reverse order.
// For example, decimal 10 should be 1010,
// but the loop prints 0101.

// 3. Solve the problem in (2) using a stack.
var number = prompt("Enter another decimal number for binary conversion:");

number = parseInt(number);

var remStack = new Stack();

while (number > 0) {

  var rem = number % 2;

  remStack.push(rem);

  number = Math.floor(number / 2);

}

var binaryString = "";

while (!remStack.isEmpty()) {

  binaryString += remStack.pop();

}

console.log("Correct binary number:", binaryString);

console.log("Creating a queue");

// 1. Implement the queue data structure described in the book. Instead of
//    using 'let items = [];' use 'var items = []'. Note that this
//    implementation does not use the prototype (see project).

function Queue() {
  // properties and methods go here
   var items = [];

  this.enqueue = function(element) {
    items.push(element);
  };

  this.dequeue = function() {
    return items.shift();
  };

  this.front = function() {
    return items[0];
  };

  this.isEmpty = function() {
    return items.length === 0;
  };

  this.size = function() {
    return items.length;
  };

  this.print = function() {
    console.log(items.toString());
  };
}

//--------------------//
// The priority queue //
//--------------------//

console.log("The priority queue");

// The following class is used below.

function QueueElement(element, priority) {

  this.element = element;

  this.priority = priority;

}

// 1. Finish the implementation below for the priority queue.
//    Note that this implementation does not use the prototype.

function PriorityQueue() {

  // create array to store queue items
  var items = [];

  this.enqueue = function(element, priority) {

    // we need to create a queue element that stores the priority as well
    var queueElement = new QueueElement(element, priority);

    // insert into priority queue (difficult part)
    // note that this should be a min priority queue,
    // meaning a lower value gets priority over a higher value

    var added = false;

    // loop through existing items
    for (var i = 0; i < items.length; i++) {

      // if new item has higher priority
      // insert before current item
      if (queueElement.priority < items[i].priority) {

        items.splice(i, 0, queueElement);

        added = true;

        break;

      }

    }

    // if item was not added inside loop
    // add it to the end of queue
    if (!added) {

      items.push(queueElement);

    }

  };

  // remove first item
  this.dequeue = function() {

    return items.shift();

  };

  // view first item
  this.front = function() {

    return items[0];

  };

  // check if queue is empty
  this.isEmpty = function() {

    return items.length === 0;

  };

  // return queue size
  this.size = function() {

    return items.length;

  };

  // helper function for printing
  this.print = function() {

    for (var i = 0; i < items.length; i++) {

      console.log(items[i].element + " - " + items[i].priority);

    }

  };

}

// 2. Write a simple test that makes sure

console.log("The circular queue - Hot Potato");

// 1. Finish the implementation for the hot potato game.
//    nameList contains the names of the participants,
//    and num is how many times the potato is passed
//    before a participant is ejected from the game.

function hotPotato(nameList, num) {

  // create a queue to store the names
  var queue = new Queue();

  // add the names to the queue
  for (var i = 0; i < nameList.length; i++) {

    queue.enqueue(nameList[i]);

  }

  // while there is more than one name in the queue
  while (queue.size() > 1) {

    // pass the potato
    for (var j = 0; j < num; j++) {

      queue.enqueue(queue.dequeue());

    }

    // remove player holding potato
    console.log("Removed player:", queue.dequeue());

  }

  // the person remaining wins
  return queue.dequeue();

}

// 2. Test the code in (1).

var winner = hotPotato(names, 3);
