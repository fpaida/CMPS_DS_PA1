// 1. Implement the linked list data structure using the prototype.

// ANSWER:
// The linked list below is implemented using the prototype approach.
// The methods are shared between all LinkedList objects using:
// LinkedList.prototype.methodName = function(){}

function Node(element) {
  this.element = element;
  this.next = null;
}

function LinkedList() {

  this.length = 0;
  this.head = null;
}

// add the prototype methods
// ...

// append(element)

// PSEUDO CODE:
// 1. Create a new node
// 2. Check if list is empty
// 3. If empty, head becomes new node
// 4. Otherwise traverse to last node
// 5. Link last node to new node
// 6. Increase length

LinkedList.prototype.append = function(element) {

  var node = new Node(element);

  // empty list
  if (this.head === null) {

    this.head = node;

  }

  // list already has elements
  else {

    var current = this.head;

    while (current.next) {
      current = current.next;
    }

    current.next = node;
  }

  this.length++;
};


// getNodeAt(position)

// PSEUDO CODE:
// 1. Check whether position is valid
// 2. Start at head
// 3. Traverse until desired position
// 4. Return node

LinkedList.prototype.getNodeAt = function(position) {

  if (position >= 0 && position < this.length) {

    var current = this.head;
    var index = 0;

    while (index < position) {

      current = current.next;
      index++;
    }

    return current;
  }

  return null;
};


// appendNode(node)

// PSEUDO CODE:
// 1. Check if list is empty
// 2. If empty, head becomes node
// 3. Otherwise traverse to last node
// 4. Connect last node to given node
// 5. Increase length

LinkedList.prototype.appendNode = function(node) {

  // empty list
  if (this.head === null) {

    this.head = node;

  }

  // list already has elements
  else {

    var current = this.head;

    while (current.next) {
      current = current.next;
    }

    current.next = node;
  }

  this.length++;
};


// size()

LinkedList.prototype.size = function() {

  return this.length;
};


// toString()

LinkedList.prototype.toString = function() {

  var current = this.head;
  var string = "List: ";

  while (current) {

    string += current.element.name;

    if (current.next) {
      string += " -> ";
    }

    current = current.next;
  }

  return string;
};


// print()

LinkedList.prototype.print = function() {

  console.log(this.toString());
};
