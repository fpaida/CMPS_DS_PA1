// ANSWER:
// Arrays are faster for retrieving the last element.
//
// In an array, the last element can be accessed directly using its index,
// such as array[array.length - 1]. This operation takes constant time O(1).
//
// In a linked list, we must start from the head and traverse each node
// until reaching the last node. This operation takes linear time O(n).
//
// Therefore, arrays are faster than linked lists for retrieving the
// last element because linked lists require iteration through the nodes.

function LinkedList() {

  // helper class
  function Node(element) {
    this.element = element;
    this.next = null;
  }

  // store length and head
  var length = 0;
  var head = null;

  this.append = function(element) {
    // add a new item to the end of the list
  
  // PSEUDO CODE:
  // 1. Create a new node
  // 2. Check whether the list is empty
  // 3. If empty, make head point to node
  // 4. Otherwise traverse to last node
  // 5. Link last node to new node
  // 6. Increase list length

  var node = new Node(element),
      current;

  if (head === null) {
    head = node;
  } else {

    current = head;

    while (current.next) {
      current = current.next;
    }

    current.next = node;
  }

  length++;

  };

  this.insert = function(position, element) {
    // insert a new item at a specific location
   
  // PSEUDO CODE:
  // 1. Check for valid position
  // 2. Create new node
  // 3. If inserting at beginning:
  //    - point node.next to current head
  //    - update head
  // 4. Otherwise traverse to desired position
  // 5. Reconnect links
  // 6. Increase length

  if (position >= 0 && position <= length) {

    var node = new Node(element),
        current = head,
        previous,
        index = 0;

    if (position === 0) {

      node.next = current;
      head = node;

    } else {

      while (index++ < position) {
        previous = current;
        current = current.next;
      }

      node.next = current;
      previous.next = node;
    }

    length++;
    return true;

  } else {

    return false;
  }

  };

  this.removeAt = function(position) {
    // remove an element from a specific location

  // PSEUDO CODE:
  // 1. Check for valid position
  // 2. If removing first node:
  //    - move head to next node
  // 3. Otherwise traverse to desired position
  // 4. Skip current node
  // 5. Decrease length
  // 6. Return removed element

  if (position > -1 && position < length) {

    var current = head,
        previous,
        index = 0;

    if (position === 0) {

      head = current.next;

    } else {

      while (index++ < position) {
        previous = current;
        current = current.next;
      }

      previous.next = current.next;
    }

    length--;

    return current.element;

  } else {

    return null;
  }
};

  this.remove = function(element) {
    // remove a specific element from the list
 
  // PSEUDO CODE:

  var index = this.indexOf(element);

  return this.removeAt(index);
};

  this.indexOf = function(element) {
    // return the index of an element in the list
  
  // PSEUDO CODE:

  // 2. Traverse through list
  // 3. Compare elements
  // 4. Return index if found
  // 5. Return -1 if not found

  var current = head,
      index = 0;

  while (current) {

    if (element === current.element) {
      return index;
    }

    index++;
    current = current.next;
  }

  return -1;
};

  return length === 0;
};

  return length;
};

  return head;
};

    var string = "List: ";
    while (current) {
      string += current.element + (current.next ? " -> " : "");
      current = current.next;
    }
    return string;
  };

  this.print = function() {
    // print to the console
    console.log(this.toString());
  };

}
